name: 보도자료 수집·AI 연관도 분석 및 대시보드 배포

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && inputs.skip_collection && '기존 데이터 AI 분석 및 배포' ||
      github.event_name == 'workflow_dispatch' && '수동 수집·AI 분석 및 배포' ||
      github.event_name == 'schedule' && format('정기 수집·AI 분석 및 배포 ({0})', github.event.schedule) ||
      '코드 변경 배포(수집·AI 분석 없음)' }}

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "collector/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/collect-and-deploy.yml"
  schedule:
    # 모든 예약은 GitHub의 IANA 시간대 기능을 사용해 한국시간으로 직접 정의한다.
    # 대시보드 수집·AI 분석·배포: 08:03, 11:03, 16:03, 19:03 KST
    # Telegram 발송: 08:03, 16:03 KST
    - cron: "3 8 * * *"
      timezone: "Asia/Seoul"
    - cron: "3 11 * * *"
      timezone: "Asia/Seoul"
    - cron: "25 13 * * *"
      timezone: "Asia/Seoul"
    - cron: "3 16 * * *"
      timezone: "Asia/Seoul"
    - cron: "3 19 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:
    inputs:
      start_date:
        description: "수집 시작일 YYYY-MM-DD (비우면 최근 기간 재확인)"
        required: false
        type: string
      end_date:
        description: "수집 종료일 YYYY-MM-DD (시작일과 함께 입력)"
        required: false
        type: string
      lookback_days:
        description: "날짜를 비운 경우 오늘 포함 재확인할 일수"
        required: false
        default: "3"
        type: string
      skip_collection:
        description: "기존 데이터만 AI 분석하고 보도자료 수집은 생략"
        required: false
        default: false
        type: boolean
      force_ai_reclassify:
        description: "기존 AI 판정을 모두 다시 수행(기준·모델 변경 시만 사용)"
        required: false
        default: false
        type: boolean
      send_telegram:
        description: "실행 완료 후 텔레그램 브리핑 시험 발송"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: policy-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schedule_guard:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
      expected_label: ${{ steps.guard.outputs.expected_label }}
    steps:
      - name: 한국시간 예약 실행 유효성 확인
        id: guard
        shell: bash
        env:
          SCHEDULE_EXPRESSION: ${{ github.event.schedule }}
          MAX_SCHEDULE_DELAY_MINUTES: '120'
        run: |
          set -euo pipefail
          allowed=true
          expected_label="수동 또는 코드 변경 실행"

          echo "GitHub event: $GITHUB_EVENT_NAME"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"

          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            case "$SCHEDULE_EXPRESSION" in
              "7 8 * * *")  expected_hour=8;  expected_minute=7; expected_label="08:07 대시보드 갱신 + Telegram" ;;
              "7 11 * * *") expected_hour=11; expected_minute=7; expected_label="11:07 대시보드 갱신" ;;
              "7 16 * * *") expected_hour=16; expected_minute=7; expected_label="16:07 대시보드 갱신 + Telegram" ;;
              "7 19 * * *") expected_hour=19; expected_minute=7; expected_label="19:07 대시보드 갱신" ;;
              *)
                echo "::error::허용되지 않은 예약 표현식입니다: $SCHEDULE_EXPRESSION"
                allowed=false
                expected_hour=0
                expected_minute=0
                expected_label="알 수 없는 예약"
                ;;
            esac

            if [[ "$allowed" == "true" ]]; then
              current_hour=$((10#$(TZ=Asia/Seoul date '+%H')))
              current_minute=$((10#$(TZ=Asia/Seoul date '+%M')))
              current_total=$((current_hour * 60 + current_minute))
              expected_total=$((expected_hour * 60 + expected_minute))
              delay=$((current_total - expected_total))
              if (( delay < 0 )); then
                delay=$((delay + 1440))
              fi

              echo "Trigger cron (Asia/Seoul): $SCHEDULE_EXPRESSION"
              echo "예정 작업: $expected_label"
              echo "예약 시각 대비 시작 지연: ${delay}분"

              if (( delay > MAX_SCHEDULE_DELAY_MINUTES )); then
                echo "::warning::예약 시각보다 ${delay}분 늦게 시작되어 이번 실행을 건너뜁니다. 심야 지연 알림을 방지하기 위한 보호 조건입니다."
                allowed=false
              fi
            fi
          fi

          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
          echo "expected_label=$expected_label" >> "$GITHUB_OUTPUT"

  build:
    needs: schedule_guard
    if: needs.schedule_guard.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 실행 유형 및 예약 시각 확인
        shell: bash
        env:
          EXPECTED_SCHEDULE_LABEL: ${{ needs.schedule_guard.outputs.expected_label }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule }}
        run: |
          echo "GitHub event: $GITHUB_EVENT_NAME"
          echo "예정 작업: $EXPECTED_SCHEDULE_LABEL"
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            echo "Trigger cron (Asia/Seoul): $SCHEDULE_EXPRESSION"
            echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
            echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"
          fi
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "코드 업로드로 시작된 실행이므로 보도자료 수집과 AI 분석은 생략하고 기존 데이터만 배포합니다."
          fi

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Python 패키지 설치
        run: pip install -r requirements.txt

      - name: Python 기본 테스트
        run: python -m unittest discover -s tests -v

      - name: JavaScript 문법 검사
        run: node --check docs/assets/app.js

      - name: 보도자료 수집
        if: github.event_name != 'push' && (github.event_name != 'workflow_dispatch' || !inputs.skip_collection)
        timeout-minutes: 20
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          INPUT_LOOKBACK_DAYS: ${{ inputs.lookback_days || '3' }}
          CONNECT_TIMEOUT_SECONDS: '15'
          READ_TIMEOUT_SECONDS: '30'
          HTTP_RETRY_TOTAL: '2'
          HTTP_BACKOFF_FACTOR: '1.5'
          KOREA_MOBILE_FALLBACK: 'true'
          PYTHONUNBUFFERED: '1'
        shell: bash
        run: |
          set -euo pipefail
          LOOKBACK_DAYS="$INPUT_LOOKBACK_DAYS"
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            # 정기 실행은 한국시간 오늘과 전날을 재확인한다.
            LOOKBACK_DAYS="2"
          fi
          args=(--lookback-days "$LOOKBACK_DAYS" --continue-on-error --detail-workers 3 --max-pages-per-day 10)
          if [[ -n "$START_DATE" && -n "$END_DATE" ]]; then
            args+=(--start-date "$START_DATE" --end-date "$END_DATE")
          else
            args+=(--require-records)
          fi
          python -u -m collector.collect "${args[@]}"

      - name: 지식재산처 AI 연관도 분석
        if: success() && github.event_name != 'push'
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
          FORCE_AI_RECLASSIFY: ${{ inputs.force_ai_reclassify || false }}
          PYTHONUNBUFFERED: '1'
        shell: bash
        run: |
          set -euo pipefail
          args=(--model "$GITHUB_MODELS_MODEL" --batch-size 3 --max-articles 300 --request-delay 4.1)
          if [[ "$FORCE_AI_RECLASSIFY" == "true" ]]; then
            args+=(--force)
          fi
          python -u -m collector.classify_relevance "${args[@]}"

      - name: 색인 재생성
        if: success()
        run: python -m collector.build_indexes

      - name: 수집·AI 분석 결과 진단
        if: always() && github.event_name != 'push'
        shell: bash
        run: |
          echo "### 보도자료 수집·지식재산처 연관도 분석 결과" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          find docs/data -maxdepth 5 -type f -print | sort | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "manifest.json:"
          cat docs/data/manifest.json || true

      - name: 변경 데이터 저장소에 반영
        if: success() && github.event_name != 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "policy-dashboard-bot"
          git config user.email "policy-dashboard-bot@users.noreply.github.com"

          git add docs/data
          echo "커밋 전 데이터 변경 파일:"
          git status --short docs/data

          if git diff --cached --quiet; then
            echo "새 데이터 변경이 없습니다."
            exit 0
          fi

          git commit -m "data: 보도자료 및 지식재산처 AI 연관도 갱신"

          # 드물게 커밋 직후 다시 기록된 데이터 파일이 있으면 같은 커밋에 포함한다.
          if ! git diff --quiet -- docs/data || ! git diff --cached --quiet -- docs/data; then
            echo "커밋 직후 추가로 변경된 데이터가 있어 기존 커밋에 포함합니다."
            git add docs/data
            git commit --amend --no-edit
          fi

          echo "커밋 후 전체 작업트리 상태:"
          git status --short

          # CI에서 의도한 변경은 docs/data뿐이다. pull/rebase를 막는 나머지 tracked 변경을 제거한다.
          git reset --hard HEAD
          git clean -fd

          for attempt in 1 2 3; do
            echo "원격 main 동기화 및 push 시도 ${attempt}/3"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "원격 main과 자동 rebase에 실패했습니다."
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "데이터 push 완료"
              exit 0
            fi
            sleep $((attempt * 3))
          done

          echo "3회 시도 후에도 push하지 못했습니다."
          exit 1

      - name: GitHub Pages 설정
        if: success()
        uses: actions/configure-pages@v6

      - name: Pages 배포 파일 업로드
        if: success()
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5

  notify_telegram:
    needs: [schedule_guard, build, deploy]
    if: >-
      ${{
        always() &&
        needs.schedule_guard.outputs.allowed == 'true' &&
        (
          (
            github.event_name == 'schedule' &&
            (github.event.schedule == '7 8 * * *' || github.event.schedule == '7 16 * * *')
          ) ||
          (github.event_name == 'workflow_dispatch' && inputs.send_telegram)
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 최신 저장 데이터 가져오기
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Telegram 전송 패키지 설치
        run: pip install requests

      - name: 텔레그램 브리핑 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_KEYWORDS: ${{ vars.TELEGRAM_KEYWORDS }}
          TELEGRAM_MAX_CRITICAL: ${{ vars.TELEGRAM_MAX_CRITICAL || '20' }}
          TELEGRAM_MAX_IMPORTANT: ${{ vars.TELEGRAM_MAX_IMPORTANT || '20' }}
          TELEGRAM_MAX_NORMAL: ${{ vars.TELEGRAM_MAX_NORMAL || '5' }}
          TELEGRAM_MAX_UNCLASSIFIED: ${{ vars.TELEGRAM_MAX_UNCLASSIFIED || '3' }}
          TELEGRAM_MAX_ARTICLES: ${{ vars.TELEGRAM_MAX_ARTICLES || '30' }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          REPORT_DATE: ${{ inputs.end_date }}
          PIPELINE_BUILD_RESULT: ${{ needs.build.result }}
          PIPELINE_DEPLOY_RESULT: ${{ needs.deploy.result }}
          TRIGGER_SCHEDULE: ${{ github.event.schedule }}
          TELEGRAM_REPORT_TITLE: ${{ github.event.schedule == '7 8 * * *' && '08시 브리핑' || github.event.schedule == '7 16 * * *' && '16시 브리핑' || '' }}
          PYTHONUNBUFFERED: '1'
        run: python -u -m collector.send_telegram
