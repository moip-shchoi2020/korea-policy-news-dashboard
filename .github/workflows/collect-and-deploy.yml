name: 보도자료 수집·AI 연관도 분석 및 대시보드 배포

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && inputs.skip_collection && '기존 데이터 AI 분석 및 배포' ||
      github.event_name == 'workflow_dispatch' && '수동 수집·AI 분석 및 배포' ||
      github.event_name == 'schedule' && '정기 수집·AI 분석 및 배포' ||
      '코드 변경 배포(수집·AI 분석 없음)' }}

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "collector/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/collect-and-deploy.yml"
  schedule:
    - cron: "23 6,18 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:
    inputs:
      start_date:
        description: "수집 시작일 YYYY-MM-DD (비우면 최근 기간 재확인)"
        required: false
        type: string
      end_date:
        description: "수집 종료일 YYYY-MM-DD (시작일과 함께 입력)"
        required: false
        type: string
      lookback_days:
        description: "날짜를 비운 경우 오늘 포함 재확인할 일수"
        required: false
        default: "3"
        type: string
      skip_collection:
        description: "기존 데이터만 AI 분석하고 보도자료 수집은 생략"
        required: false
        default: false
        type: boolean
      force_ai_reclassify:
        description: "기존 AI 판정을 모두 다시 수행(기준·모델 변경 시만 사용)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: policy-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 실행 유형 확인
        shell: bash
        run: |
          echo "GitHub event: $GITHUB_EVENT_NAME"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "코드 업로드로 시작된 실행이므로 보도자료 수집과 AI 분석은 생략하고 기존 데이터만 배포합니다."
            echo "기존 자료를 AI 분석하려면 저장소 상단 Actions → 이 워크플로 → Run workflow에서 '기존 데이터만 AI 분석'을 선택하세요."
          fi

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Python 패키지 설치
        run: pip install -r requirements.txt

      - name: Python 기본 테스트
        run: python -m unittest discover -s tests -v

      - name: JavaScript 문법 검사
        run: node --check docs/assets/app.js

      - name: 보도자료 수집
        if: github.event_name != 'push' && (github.event_name != 'workflow_dispatch' || !inputs.skip_collection)
        timeout-minutes: 20
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          INPUT_LOOKBACK_DAYS: ${{ inputs.lookback_days || '3' }}
          PYTHONUNBUFFERED: '1'
        shell: bash
        run: |
          set -euo pipefail
          LOOKBACK_DAYS="$INPUT_LOOKBACK_DAYS"
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            # HTML 상세페이지를 반복 조회하므로 정기 실행은 최근 2일만 재확인한다.
            LOOKBACK_DAYS="2"
          fi
          args=(--lookback-days "$LOOKBACK_DAYS" --continue-on-error --detail-workers 3 --max-pages-per-day 10)
          if [[ -n "$START_DATE" && -n "$END_DATE" ]]; then
            args+=(--start-date "$START_DATE" --end-date "$END_DATE")
          else
            args+=(--require-records)
          fi
          python -u -m collector.collect "${args[@]}"

      - name: 지식재산처 AI 연관도 분석
        if: success() && github.event_name != 'push'
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
          FORCE_AI_RECLASSIFY: ${{ inputs.force_ai_reclassify || false }}
          PYTHONUNBUFFERED: '1'
        shell: bash
        run: |
          set -euo pipefail
          args=(--model "$GITHUB_MODELS_MODEL" --batch-size 3 --max-articles 300 --request-delay 4.1)
          if [[ "$FORCE_AI_RECLASSIFY" == "true" ]]; then
            args+=(--force)
          fi
          python -u -m collector.classify_relevance "${args[@]}"

      - name: 색인 재생성
        if: success()
        run: python -m collector.build_indexes

      - name: 수집·AI 분석 결과 진단
        if: always() && github.event_name != 'push'
        shell: bash
        run: |
          echo "### 보도자료 수집·지식재산처 연관도 분석 결과" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          find docs/data -maxdepth 5 -type f -print | sort | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "manifest.json:"
          cat docs/data/manifest.json || true

      - name: 변경 데이터 저장소에 반영
        if: success() && github.event_name != 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "policy-dashboard-bot"
          git config user.email "policy-dashboard-bot@users.noreply.github.com"
          git add docs/data
          echo "변경 파일:"
          git status --short docs/data
          if git diff --cached --quiet; then
            echo "새 데이터 변경이 없습니다."
          else
            git commit -m "data: 보도자료 및 지식재산처 AI 연관도 갱신"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: GitHub Pages 설정
        if: success()
        uses: actions/configure-pages@v6

      - name: Pages 배포 파일 업로드
        if: success()
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5
